<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenProject Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Custom Select2 Dark Theme */
        .select2-container--default .select2-selection--single {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 8px !important;
            height: 48px !important;
            display: flex !important;
            align-items: center !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: var(--text-color) !important;
            padding-left: 16px !important;
            line-height: normal !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 46px !important;
            right: 10px !important;
        }

        .select2-dropdown {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            z-index: 9999;
        }

        .select2-search__field {
            background-color: var(--input-bg) !important;
            color: var(--text-color) !important;
            border: 1px solid var(--border-color) !important;
        }

        .select2-results__option--highlighted[aria-selected] {
            background-color: var(--primary-color) !important;
            color: #000 !important;
        }

        .select2-results__option[aria-selected=true] {
            background-color: rgba(255, 143, 0, 0.2) !important;
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="color: var(--primary-color); margin: 0; font-size: 1.8rem;">OpenProject Task Manager</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <!-- Settings Dropdown -->
                <div style="position: relative;">
                    <button id="settingsBtn"
                        style="background: transparent; border: none; color: #aaa; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </button>
                    <!-- Dropdown Content -->
                    <div id="settingsDropdown"
                        style="display: none; position: absolute; right: 0; top: 100%; background: #333; border: 1px solid #444; border-radius: 6px; padding: 5px; min-width: 150px; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
                        <button id="syncUsersBtn"
                            style="background: transparent; border: none; color: #eee; width: 100%; text-align: left; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 0.9rem;">
                            Sync Users
                        </button>
                        <button id="syncProjectsBtn"
                            style="background: transparent; border: none; color: #eee; width: 100%; text-align: left; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 0.9rem;">
                            Sync Projects
                        </button>
                    </div>
                </div>
                <span id="userNameDisplay"
                    style="color: var(--text-color); font-weight: 500; font-size: 1rem;">Loading...</span>
                <button id="logoutBtn"
                    style="width: auto; padding: 8px 20px; background-color: var(--primary-color); color: #000; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem;">
                    Logout
                </button>
            </div>
        </header>

        <div class="content-row">
            <!-- Left Panel: Create Task -->
            <div class="panel left-panel">
                <header>
                    <h2>Create New Task</h2>
                    <p>Add a new work package to OpenProject</p>
                </header>

                <main>
                    <form id="createTaskForm">
                        <div class="form-group">
                            <label for="projectId">Project</label>
                            <select id="projectId" style="width: 100%;" required>
                                <option value="" disabled selected>Search projects...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="taskType">Task Type</label>
                            <select id="taskType" style="width: 100%;" required disabled>
                                <option value="" disabled selected>Select a Project first</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="taskName">Task Name</label>
                            <input type="text" id="taskName" placeholder="Enter task name" required>
                        </div>

                        <div class="form-group">
                            <label for="assigneeId">Assignee</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <select id="assigneeId" style="width: 100%;">
                                    <option value="" disabled selected>Select an Assignee</option>
                                </select>
                                <button type="button" id="manageAssigneesBtn"
                                    style="width: 48px; padding: 0; height: 48px; font-size: 1.5rem;"
                                    title="Manage Assignees">+</button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="startDate">Start Date</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input type="date" id="startDate" style="flex: 1;">
                                <button type="button" id="todayBtn" title="Set Start Date to Today"
                                    style="width: auto; padding: 0 15px; height: 46px; white-space: nowrap;">
                                    Today
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="dueDate">Finish Date</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input type="date" id="dueDate" style="flex: 1;">
                                <button type="button" id="sameDateBtn" title="Set End Date same as Start Date"
                                    style="width: auto; padding: 0 15px; height: 46px; white-space: nowrap;">
                                    Same as Start Date
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="spentHours">Time Spent (Hours)</label>
                            <input type="number" id="spentHours" placeholder="e.g. 2 or 8" min="0" step="0.5" value="1">
                        </div>

                        <div class="form-group">
                            <label>% Complete</label>
                            <div class="percentage-group">
                                <input type="hidden" id="percentageDone" value="100">
                                <button type="button" class="percent-btn" data-value="0">0%</button>
                                <button type="button" class="percent-btn" data-value="25">25%</button>
                                <button type="button" class="percent-btn" data-value="50">50%</button>
                                <button type="button" class="percent-btn" data-value="75">75%</button>
                                <button type="button" class="percent-btn active" data-value="100">100%</button>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn">
                            <span>Add Task</span>
                            <div class="loader" id="btnLoader"></div>
                        </button>
                    </form>
                </main>
            </div>

            <!-- Right Panel: History -->
            <div class="panel right-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Recent History</h2>
                </div>
                <div class="history-container">
                    <table id="historyTable"
                        style="width: 100%; border-collapse: collapse; color: #eee; table-layout: fixed; font-size: 0.85rem;">
                        <thead>
                            <tr style="border-bottom: 2px solid #333;">
                                <th style="padding: 10px; text-align: left; width: 80px;">Created</th>
                                <th style="padding: 10px; text-align: left; width: 25%;">Task</th>
                                <th style="padding: 10px; text-align: left; width: 20%;">Project</th>
                                <th style="padding: 10px; text-align: left; width: 90px;">Start</th>
                                <th style="padding: 10px; text-align: left; width: 90px;">Finish</th>
                                <th style="padding: 10px; text-align: center; width: 60px;">Hours</th>
                                <th style="padding: 10px; text-align: center; width: 50px;">Link</th>
                                <th style="padding: 10px; text-align: center; width: 40px;"></th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 20px; color: #777;">Loading
                                    history...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Pagination Controls -->
                <div id="paginationControls"
                    style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; font-size: 0.9rem; color: #888;">
                    <span id="pageInfo">Showing 0-0 of 0</span>
                    <div style="display: flex; gap: 10px;">
                        <button id="prevPageBtn" disabled
                            style="background: transparent; border: 1px solid #444; color: var(--text-color); width: 32px; height: 32px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <button id="nextPageBtn" disabled
                            style="background: transparent; border: 1px solid #444; color: var(--text-color); width: 32px; height: 32px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
