<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenProject Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Custom Select2 Dark Theme */
        .select2-container--default .select2-selection--single {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 8px !important;
            height: 48px !important;
            display: flex !important;
            align-items: center !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: var(--text-color) !important;
            padding-left: 16px !important;
            line-height: normal !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 46px !important;
            right: 10px !important;
        }

        .select2-dropdown {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            z-index: 9999;
        }

        .select2-search__field {
            background-color: var(--input-bg) !important;
            color: var(--text-color) !important;
            border: 1px solid var(--border-color) !important;
        }

        .select2-results__option--highlighted[aria-selected] {
            background-color: var(--primary-color) !important;
            color: #000 !important;
        }

        .select2-results__option[aria-selected=true] {
            background-color: rgba(255, 143, 0, 0.2) !important;
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="color: var(--primary-color); margin: 0; font-size: 1.8rem;">OpenProject Task Manager</h1>

            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="userNameDisplay"
                    style="color: var(--text-color); font-weight: 500; font-size: 1rem; margin-right: 10px;">Loading...</span>

                <!-- Settings Dropdown -->
                <div id="settingsWrapper" style="position: relative; display: none;">
                    <button id="settingsBtn"
                        style="background: transparent; border: none; color: #ccc; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </button>
                    <div id="settingsDropdown"
                        style="display: none; position: absolute; right: 0; top: 100%; background: #333; border: 1px solid #444; border-radius: 6px; padding: 5px; min-width: 180px; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
                        <button id="syncUsersBtn"
                            style="background: transparent; border: none; color: #eee; width: 100%; text-align: left; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 0.9rem;">Sync
                            Users</button>
                        <button id="syncProjectsBtn"
                            style="background: transparent; border: none; color: #eee; width: 100%; text-align: left; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 0.9rem;">Sync
                            Projects</button>
                        <hr style="border: none; border-top: 1px solid #444; margin: 5px 0;">
                        <button id="adminPanelBtn"
                            style="background: transparent; border: none; color: #eee; width: 100%; text-align: left; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 0.9rem; font-weight: 600;">Admin
                            Panel</button>
                        <button id="resetRankingBtn"
                            style="background: transparent; border: none; color: #ff6b6b; width: 100%; text-align: left; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 0.9rem; font-weight: 600;">Reset
                            Ranking</button>
                    </div>
                </div>

                <button id="logoutBtn"
                    style="width: auto; padding: 8px 20px; background-color: var(--primary-color); color: #000; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem;">Sign
                    Out</button>
            </div>
        </header>

        <div class="content-row">
            <!-- Left Column: Create Task (58% / col-7) -->
            <div class="left-column-wrapper"
                style="flex: 7; display: flex; flex-direction: column; gap: 20px; min-width: 450px;">
                <!-- Panel 1: Create Task -->
                <div class="panel left-panel" style="width: 100%; max-width: none;">
                    <header>
                        <h2>Create New Task</h2>
                        <p>Add a new work package to OpenProject</p>
                    </header>

                    <main>
                        <form id="createTaskForm">
                            <!-- Row 1: Project + Task Type -->
                            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                    <label for="projectId">Project</label>
                                    <select id="projectId" style="width: 100%;" required>
                                        <option value="" disabled selected>Search projects...</option>
                                    </select>
                                </div>
                                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                    <label for="taskType">Task Type</label>
                                    <select id="taskType" style="width: 100%;" required disabled>
                                        <option value="" disabled selected>Select a Project first</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="taskName">Task Name</label>
                                <input type="text" id="taskName" placeholder="Enter task name" required maxlength="500">
                            </div>

                            <div class="form-group">
                                <label for="taskDescription">Description</label>
                                <textarea id="taskDescription" placeholder="Enter task description (optional)" rows="3"
                                    style="width: 100%; padding: 10px; border: 1px solid #333; border-radius: 4px; background: #2a2a2a; color: #fff;"></textarea>
                            </div>



                            <!-- Row 2: Start Date + Finish Date -->
                            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                    <label for="startDate">Start Date</label>
                                    <div style="display: flex; gap: 10px; align-items: center;">
                                        <input type="date" id="startDate" style="flex: 1;">
                                        <button type="button" id="todayBtn" title="Set Start Date to Today"
                                            style="width: auto; padding: 0 15px; height: 46px; white-space: nowrap;">
                                            Today
                                        </button>
                                    </div>
                                </div>
                                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                    <label for="dueDate">Finish Date</label>
                                    <input type="date" id="dueDate" style="width: 100%;">
                                </div>
                            </div>

                            <!-- Row 3: Assignee + Time Spent -->
                            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                    <label for="assigneeId">Assignee</label>
                                    <select id="assigneeId" style="width: 100%;">
                                        <option value="" disabled selected>Select an Assignee</option>
                                    </select>
                                </div>
                                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                    <label for="spentHours">Time (Hr)</label>
                                    <div style="display: flex; align-items: stretch; height: 48px;">
                                        <button type="button" id="decreaseTimeBtn"
                                            style="width: 40px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px 0 0 8px; cursor: pointer;">-</button>
                                        <input type="number" id="spentHours" placeholder="Hr" min="0" step="0.5"
                                            value="1"
                                            style="width: 100%; text-align: center; border-radius: 0; border-left: none; border-right: none; height: 48px; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); box-sizing: border-box; background: var(--input-bg); color: var(--text-color); padding: 0;">
                                        <button type="button" id="increaseTimeBtn"
                                            style="width: 40px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 0 8px 8px 0; cursor: pointer;">+</button>
                                    </div>
                                </div>
                            </div>

                            <!-- Row 4: %Complete -->
                            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                                    <label>% Complete</label>
                                    <div class="percentage-group" style="display: flex; gap: 5px;">
                                        <input type="hidden" id="percentageDone" value="100">
                                        <button type="button" class="percent-btn" data-value="25"
                                            style="flex: 1; padding: 0;">25%</button>
                                        <button type="button" class="percent-btn" data-value="50"
                                            style="flex: 1; padding: 0;">50%</button>
                                        <button type="button" class="percent-btn" data-value="75"
                                            style="flex: 1; padding: 0;">75%</button>
                                        <button type="button" class="percent-btn active" data-value="100"
                                            style="flex: 1; padding: 0;">100%</button>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" id="submitBtn">
                                <span>Add Task</span>
                                <div class="loader" id="btnLoader"></div>
                            </button>
                        </form>
                    </main>
                </div>

                <!-- Panel 1.5: Weekly Chart -->
                <div class="panel left-panel" style="width: 100%; max-width: none;">
                    <header style="margin-bottom: 15px;">
                        <h2 style="font-size: 1.2rem;">Weekly Activity</h2>
                    </header>
                    <div style="position: relative; height: 600px; width: 100%;">
                        <canvas id="weeklyChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Right Column: Ranking & History (41% / col-5) -->
            <div class="right-column-wrapper"
                style="flex: 5; display: flex; flex-direction: column; gap: 20px; min-width: 350px;">
                <!-- Panel 2: Ranking -->
                <div class="panel right-panel-users" style="min-width: 0; display: flex; flex-direction: column;">
                    <div style="margin-bottom: 20px;">
                        <h2>Ranking</h2>
                    </div>
                    <div class="users-stats-container" style="overflow-y: auto; flex: 1;">
                        <table id="usersStatsTable"
                            style="width: 100%; border-collapse: collapse; color: #eee; font-size: 0.9rem;">
                            <thead>
                                <tr style="border-bottom: 2px solid #333;">
                                    <th style="padding: 10px; width: 40px; text-align: center;">#</th>
                                    <th style="padding: 10px; text-align: left;">Name</th>
                                    <th style="padding: 10px; width: 50px; text-align: center;">Tasks</th>
                                </tr>
                            </thead>
                            <tbody id="usersStatsBody">
                                <tr>
                                    <td colspan="3" style="text-align: center; padding: 20px; color: #777;">Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Panel 3: History (Moved Here) -->
                <div class="panel right-panel" style="width: 100%; max-width: none; min-width: 0;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>Recent History</h2>
                    </div>
                    <div class="history-container">
                        <table id="historyTable"
                            style="width: 100%; border-collapse: collapse; color: #eee; font-size: 0.85rem;">
                            <thead>
                                <tr style="border-bottom: 2px solid #333;">
                                    <th style="padding: 8px; text-align: left; width: 50px;">Date</th>
                                    <th style="padding: 8px; text-align: left;">Task</th>
                                    <th style="padding: 8px; text-align: center; width: 40px;">Hr</th>
                                    <th style="padding: 8px; text-align: center; width: 90px;">Action</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody">
                                <tr>
                                    <td colspan="4" style="text-align: center; padding: 20px; color: #777;">Loading
                                        history...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination Controls -->
                    <div id="paginationControls"
                        style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; font-size: 0.8rem; color: #888;">
                        <span id="pageInfo">0-0/0</span>
                        <div style="display: flex; gap: 5px;">
                            <button id="prevPageBtn" disabled
                                style="width: 28px; height: 28px; border: 1px solid #444; background: transparent; color: #ccc; border-radius: 4px; padding:0; display:flex; align-items:center; justify-content:center;">&lt;</button>
                            <button id="nextPageBtn" disabled
                                style="width: 28px; height: 28px; border: 1px solid #444; background: transparent; color: #ccc; border-radius: 4px; padding:0; display:flex; align-items:center; justify-content:center;">&gt;</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Panel Modal -->
    <div id="adminModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; overflow-y: auto;">
        <div
            style="max-width: 900px; margin: 50px auto; background: #2a2a2a; border-radius: 8px; padding: 30px; box-shadow: 0 8px 16px rgba(0,0,0,0.4);">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #444; padding-bottom: 15px;">
                <h2 style="margin: 0; color: #fff; font-size: 1.5rem;">🔐 User Management</h2>
                <button id="closeAdminModal"
                    style="background: transparent; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">&times;</button>
            </div>
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <thead>
                    <tr style="background: #333; color: #fff;">
                        <th style="padding: 12px; text-align: left; border-bottom: 2px solid #444;">ID</th>
                        <th style="padding: 12px; text-align: left; border-bottom: 2px solid #444;">Username</th>
                        <th style="padding: 12px; text-align: left; border-bottom: 2px solid #444;">Name</th>
                        <th style="padding: 12px; text-align: left; border-bottom: 2px solid #444;">Role</th>
                        <th style="padding: 12px; text-align: center; border-bottom: 2px solid #444;">Actions</th>
                    </tr>
                </thead>
                <tbody id="userListBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 20px; color: #777;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
