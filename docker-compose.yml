version: '3.8'

services:
  app:
    build: .
    container_name: openproject-poc-app
    ports:
      - "3001:3001"
    volumes:
      - ./projects.db:/app/projects.db
    environment:
      - NODE_ENV=production
      - PORT=3001
    # Optional: Use .env.production file for sensitive environment variables
    # Uncomment the line below and create .env.production file
    # env_file:
    #   - .env.production
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3001/', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
