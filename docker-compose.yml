services:
  app:
    build: .
    container_name: openproject-poc-app
    ports:
      - "8001:3001"
    volumes:
      - db_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_FILE=/app/data/projects.db
    restart: unless-stopped
    init: true
    stop_grace_period: 10s
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3001/', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db_data:
